<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Account</title>
    <link rel="stylesheet" href="style.css">
    <script src="Scripts/user.js" type="module" defer></script>
    <script src="Scripts/main.js" type="module" defer></script>
</head>
<body class="page-user">
    <nav></nav>
    <main class="main-content">
        <h1>Manage Your Account</h1>
        <section id="update-user-info" class="form-container">
            <h2>Update Information</h2>
            <form id="update-user-form">
                <label for="firstName">First Name:</label>
                <input type="text" id="firstName" name="firstName" required>
                <label for="lastName">Last Name:</label>
                <input type="text" id="lastName" name="lastName" required>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <button type="submit" class="btn-submit">Update Info</button>
            </form>
        </section>
        <section id="update-password" class="form-container">
            <h2>Update Password</h2>
            <form id="update-password-form">
                <label for="oldPassword">Old Password:</label>
                <input type="password" id="oldPassword" name="oldPassword" required>
                <label for="newPassword">New Password:</label>
                <input type="password" id="newPassword" name="newPassword" required>
                <button type="submit" class="btn-submit">Update Password</button>
            </form>
        </section>
        <section id="delete-account" class="form-container">
            <h2>Delete Account</h2>
            <p>This action is irreversible. Please be certain.</p>
            <button id="delete-account-button" class="btn-submit btn-delete">Delete My Account</button>
        </section>
    </main>
</body>
</html>
