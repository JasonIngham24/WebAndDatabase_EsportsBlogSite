<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Post</title>
    <link rel="stylesheet" href="style.css">
    <script src="Scripts/post.js" type="module" defer></script>
    <script src="Scripts/main.js" type="module" defer></script>
</head>
<body class="page-create-post">
    <nav></nav>

    <main class="main-content">
        <h1>Create a Post</h1>

        <form class="form-container" id="postForm">
            <label for="postTitle">Title:</label>
            <input type="text" id="postTitle" name="postTitle">
            <label for="postContent">Your Post:</label>
            <textarea id="postContent" name="postContent" rows="5"></textarea>

            <input type="submit" value="Submit Post" class="btn-submit">
        </form>
    </main>
</body>
</html>
