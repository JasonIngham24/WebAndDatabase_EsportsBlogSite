<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
    <link rel="stylesheet" href="style.css">
    <script src="Scripts/user.js" defer></script>
</head>
<body class="page-register">
    <nav>
        <a href="index.html">Home</a>
        <a href="register.html">Register</a>
        <a href="login.html">Login</a>
        <a href="post.html">Create Post</a>
    </nav>

    <main class="main-content">
        <h1>Register</h1>

        <form class="form-container" id="registrationForm">
        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" name="firstName">

        <label for="lastName">Last Name:</label>
        <input type="text" id="lastName" name="lastName">

        <label for="email">Email:</label>
        <input type="email" id="email" name="email">

        <label for="password">Password:</label>
        <input type="password" id="password" name="password">

        <div class="radio-group">
            <label>You are a:</label><br>
            <input type="radio" id="player" name="accountType" value="player">
            <label for="player">Player</label><br>
            <input type="radio" id="coach" name="accountType" value="coach">
            <label for="coach">Coach</label>
        </div>

            <input type="submit" value="Register" class="btn-submit">
        </form>
    </main>
</body>
</html>
