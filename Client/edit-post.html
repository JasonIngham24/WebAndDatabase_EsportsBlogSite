<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post</title>
    <link rel="stylesheet" href="style.css">
    <script src="Scripts/main.js" type="module" defer></script>
    <script src="Scripts/post.js" type="module" defer></script>
</head>
<body class="page-edit-post">
    <nav></nav>
    <main class="main-content">
        <h1>Edit Post</h1>
        <form class="form-container" id="editPostForm">
            <input type="hidden" id="editPostId">
            <label for="editPostTitle">Title:</label>
            <input type="text" id="editPostTitle" name="postTitle">
            <label for="editPostContent">Your Post:</label>
            <textarea id="editPostContent" name="postContent" rows="5"></textarea>
            <input type="submit" value="Update Post" class="btn-submit">
        </form>
    </main>
</body>
</html>
